<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoPortal - Inloggen</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <h1>CryptoPortal</h1>
        <p class="subtitle">Veilig Inloggen</p>
    </div>

    <div class="login-box">
        <h2>Portefeuille Toegang</h2>
        <p class="login-hint">Voer je portefeuille-ID en PIN in</p>
        
        <form method="POST" action="/inloggen">
            <div class="form-group">
                <label for="walletid">Portefeuille ID</label>
                <input 
                    type="number" 
                    id="walletid"
                    name="walletid" 
                    required 
                    min="100"
                    max="999"
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="pin">PIN Code</label>
                <input 
                    type="password" 
                    id="pin"
                    name="pin" 
                    required 
                    placeholder="Vul je PIN in"
                    maxlength="6"
                >
            </div>

            <button type="submit" class="btn btn-primary full-width">Inloggen</button>
        </form>
    </div>

  
</div>

</body>
</html>
